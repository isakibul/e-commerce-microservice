name: Compose Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Docker Compose, Kong, and Keycloak smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Configure Kong
        run: ./infra/kong/setup.sh

      - name: Check health through Kong
        run: ./scripts/smoke-health.sh

      - name: Run Keycloak E2E smoke
        run: npm run smoke:keycloak

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Stop stack
        if: always()
        run: docker compose down
