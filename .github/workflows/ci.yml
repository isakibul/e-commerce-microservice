name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            services/*/package-lock.json
            gateway/package-lock.json

      - name: Install service dependencies
        run: npm run ci:install

      - name: Verify
        run: npm run verify
