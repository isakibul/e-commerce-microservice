services:
  postgres:
    image: postgres:13
    container_name: postgres
    restart: on-failure
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: on-failure
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
      - "5051:443"

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog2
    restart: on-failure
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailhog:/var/lib/mailhog

  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6380:6379"
      - "8011:8001"
    volumes:
      - redis-stack:/var/lib/redis-stack
    environment:
      - REDIS_ARGS=--save 900 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-database:
    image: postgres:16
    container_name: keycloak-database
    restart: on-failure
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: keycloak
    restart: on-failure
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-database:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-database:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/ecommerce-realm.json:/opt/keycloak/data/import/ecommerce-realm.json:ro

  kong-database:
    image: postgres:13
    container_name: kong-database
    restart: on-failure
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - kong-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:3.7
    container_name: kong-migrations
    command: sh -c "kong migrations bootstrap || (kong migrations up && kong migrations finish)"
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong

  kong:
    image: kong:3.7
    container_name: kong
    restart: on-failure
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://127.0.0.1:8002
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: kong.plugins.jwt.jwt_parser
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_change_me}
    ports:
      - "8000:8000"
      - "8443:8443"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8002:8002"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4003
      SERVICE_NAME: Auth-Service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth?schema=public
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_change_me}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/ecommerce}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ecommerce-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ecommerce-api}
      USER_SERVICE_URL: http://user:4004
      EMAIL_SERVICE_URL: http://email:4005
      QUEUE_URL: amqp://guest:guest@rabbitmq:5672
    expose:
      - "4003"

  user:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: user
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4004
      SERVICE_NAME: User-Service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/user?schema=public
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/ecommerce}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ecommerce-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ecommerce-api}
    expose:
      - "4004"

  product:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    container_name: product
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
      SERVICE_NAME: Product-Service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/product?schema=public
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/ecommerce}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ecommerce-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ecommerce-api}
      INVENTORY_SERVICE_URL: http://inventory:4002
    expose:
      - "4001"

  inventory:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile
    container_name: inventory
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4002
      SERVICE_NAME: Inventory-Service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventory?schema=public
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/ecommerce}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ecommerce-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ecommerce-api}
    expose:
      - "4002"

  cart:
    build:
      context: .
      dockerfile: services/cart/Dockerfile
    container_name: cart
    restart: on-failure
    depends_on:
      redis-stack:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      inventory:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4006
      SERVICE_NAME: Cart-Service
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      REDIS_HOST: redis-stack
      REDIS_PORT: 6379
      INVENTORY_SERVICE_URL: http://inventory:4002
      QUEUE_URL: amqp://guest:guest@rabbitmq:5672
    expose:
      - "4006"

  order:
    build:
      context: .
      dockerfile: services/order/Dockerfile
    container_name: order
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      cart:
        condition: service_started
      product:
        condition: service_started
      email:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4007
      SERVICE_NAME: Order-Service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order?schema=public
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/ecommerce}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ecommerce-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ecommerce-api}
      CART_SERVICE_URL: http://cart:4006
      EMAIL_SERVICE_URL: http://email:4005
      PRODUCT_SERVICE_URL: http://product:4001
      QUEUE_URL: amqp://guest:guest@rabbitmq:5672
    expose:
      - "4007"

  email:
    build:
      context: .
      dockerfile: services/email/Dockerfile
    container_name: email
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4005
      SERVICE_NAME: Email-Service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/email?schema=public
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-local_dev_internal_gateway_secret}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/ecommerce}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ecommerce-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ecommerce-api}
      REDIS_HOST: redis-stack
      REDIS_PORT: 6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      DEFAULT_EMAIL_SENDER: admin@example.com
      QUEUE_URL: amqp://guest:guest@rabbitmq:5672
    expose:
      - "4005"

volumes:
  postgres:
  mailhog:
  redis-stack:
  rabbitmq:
  kong-data:
  keycloak-data:
